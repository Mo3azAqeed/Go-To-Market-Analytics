name: dlt CI

on:
  push:
    paths:
      - "dlt/**"
  pull_request:
    paths:
      - "dlt/**"

# Credentials strategy:
# - Attio API token → ATTIO_SOURCE__API_TOKEN (dlt resolves by function name prefix)
# - BigQuery → DESTINATION__BIGQUERY__CREDENTIALS set to the full service account JSON string.
#   dlt parses it natively — no newline-escaping issues that come with splitting the key
#   into separate fields (BQ_PRIVATE_KEY, BQ_CLIENT_EMAIL, etc.).
# - location and project_id are non-secret and live in .dlt/config.toml.

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dlt/requirements.txt

      - name: Install dependencies
        run: pip install -r dlt/requirements.txt pytest

      - name: Run unit tests
        working-directory: dlt
        run: pytest sources/attio/tests/ -v --tb=short

  dry-run:
    name: Pipeline dry-run (fixture data)
    runs-on: ubuntu-latest
    needs: test

    env:
      ATTIO_SOURCE__API_TOKEN: ${{ secrets.ATTIO_API_TOKEN }}
      ATTIO_SOURCE__MQL_LIST_ID: ${{ secrets.ATTIO_MQL_LIST_ID }}
      DESTINATION__BIGQUERY__CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dlt/requirements.txt

      - name: Install dependencies
        run: pip install -r dlt/requirements.txt

      - name: Dry-run — validate pipeline initialises without errors
        working-directory: dlt
        run: |
          python - << 'EOF'
          import dlt
          from sources.attio import attio_source
          source = attio_source()
          resource_names = list(source.resources.keys())
          expected = {"mqls", "closed_deals", "sdrs", "sales_activities"}
          missing = expected - set(resource_names)
          assert not missing, f"Missing resources: {missing}"
          print("Dry-run passed. Resources:", resource_names)
          EOF

  full-sync:
    name: Full sync to BigQuery (merge to main only)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      ATTIO_SOURCE__API_TOKEN: ${{ secrets.ATTIO_API_TOKEN }}
      ATTIO_SOURCE__MQL_LIST_ID: ${{ secrets.ATTIO_MQL_LIST_ID }}
      DESTINATION__BIGQUERY__CREDENTIALS: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dlt/requirements.txt

      - name: Install dependencies
        run: pip install -r dlt/requirements.txt

      - name: Run Attio pipeline
        working-directory: dlt
        run: python pipelines/attio_pipeline.py
