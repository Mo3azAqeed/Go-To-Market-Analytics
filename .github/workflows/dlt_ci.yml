name: dlt CI

on:
  push:
    paths:
      - "dlt/**"
  pull_request:
    paths:
      - "dlt/**"

# All secrets are passed as environment variables — no secrets.toml file is written.
# dlt maps env vars to config using __ as section separator (all uppercase).
# See dlt/README.md § "Environment variables" for the full mapping.

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dlt/requirements.txt

      - name: Install dependencies
        run: pip install -r dlt/requirements.txt pytest

      - name: Run unit tests
        working-directory: dlt
        run: pytest sources/attio/tests/ -v --tb=short

  dry-run:
    name: Pipeline dry-run (fixture data)
    runs-on: ubuntu-latest
    needs: test

    env:
      SOURCES__ATTIO_SOURCE__API_TOKEN: ${{ secrets.ATTIO_API_TOKEN }}
      SOURCES__ATTIO_SOURCE__MQL_LIST_ID: ${{ secrets.ATTIO_MQL_LIST_ID }}
      DESTINATION__BIGQUERY__LOCATION: "US"
      DESTINATION__BIGQUERY__CREDENTIALS__PROJECT_ID: "obito-492802"
      DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY_ID: ${{ secrets.BQ_PRIVATE_KEY_ID }}
      DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY: ${{ secrets.BQ_PRIVATE_KEY }}
      DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_EMAIL: ${{ secrets.BQ_CLIENT_EMAIL }}
      DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_ID: ${{ secrets.BQ_CLIENT_ID }}
      DESTINATION__BIGQUERY__CREDENTIALS__TOKEN_URI: "https://oauth2.googleapis.com/token"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dlt/requirements.txt

      - name: Install dependencies
        run: pip install -r dlt/requirements.txt

      - name: Dry-run — validate pipeline initialises without errors
        working-directory: dlt
        run: |
          python - << 'EOF'
          import dlt
          from sources.attio import attio_source
          source = attio_source()
          resource_names = list(source.resources.keys())
          expected = {"mqls", "closed_deals", "sdrs", "sales_activities"}
          missing = expected - set(resource_names)
          assert not missing, f"Missing resources: {missing}"
          print("Dry-run passed. Resources:", resource_names)
          EOF

  full-sync:
    name: Full sync to BigQuery (merge to main only)
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      SOURCES__ATTIO_SOURCE__API_TOKEN: ${{ secrets.ATTIO_API_TOKEN }}
      SOURCES__ATTIO_SOURCE__MQL_LIST_ID: ${{ secrets.ATTIO_MQL_LIST_ID }}
      DESTINATION__BIGQUERY__LOCATION: "US"
      DESTINATION__BIGQUERY__CREDENTIALS__PROJECT_ID: "obito-492802"
      DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY_ID: ${{ secrets.BQ_PRIVATE_KEY_ID }}
      DESTINATION__BIGQUERY__CREDENTIALS__PRIVATE_KEY: ${{ secrets.BQ_PRIVATE_KEY }}
      DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_EMAIL: ${{ secrets.BQ_CLIENT_EMAIL }}
      DESTINATION__BIGQUERY__CREDENTIALS__CLIENT_ID: ${{ secrets.BQ_CLIENT_ID }}
      DESTINATION__BIGQUERY__CREDENTIALS__TOKEN_URI: "https://oauth2.googleapis.com/token"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: dlt/requirements.txt

      - name: Install dependencies
        run: pip install -r dlt/requirements.txt

      - name: Run Attio pipeline
        working-directory: dlt
        run: python pipelines/attio_pipeline.py
